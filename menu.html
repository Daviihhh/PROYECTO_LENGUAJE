<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forza Horizon 6</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

  <style>

    /* ── RESET BÁSICO ── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ── VARIABLES DE COLOR ── */
    :root {
      --negro:  #24190d;
      --papel:  #ffffff;
      --rojo:   #c42c1c;
      --dorado: #b8963e;
      --gris:   #5a5857;
    }

    /* ── BODY: fondo oscuro, centrado ── */
    body {
      font-family: 'Rajdhani', sans-serif;
      background-color: var(--negro);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
    }

    /* ══════════════════════════════
       CABECERA
    ══════════════════════════════ */

    header {
      text-align: center;
      margin-bottom: 50px;
    }

    /* Texto pequeño en japonés encima del título */
    .subtitulo-jp {
      font-family: 'Noto Serif JP', serif;
      font-size: 13px;
      letter-spacing: 6px;
      color: var(--dorado);
      margin-bottom: 12px;
    }

    /* Título principal */
    h1 {
      font-size: 52px;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--papel);
      margin-bottom: 10px;
    }

    /* Línea decorativa debajo del título: tres elementos en fila */
    .divisor {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .divisor-linea {
      width: 80px;
      height: 1px;
      background-color: var(--gris);
    }

    /* Cuadrado rotado 45° → queda como un rombo */
    .divisor-rombo {
      width: 6px;
      height: 6px;
      background-color: var(--rojo);
      transform: rotate(45deg);
    }

    /* Frase descriptiva */
    .tagline {
      font-size: 14px;
      letter-spacing: 2px;
      color: var(--gris);
    }

    /* ══════════════════════════════
       GRID DE FOTOS
    ══════════════════════════════ */

    .fotos {
      display: grid;
      /* 3 columnas iguales */
      grid-template-columns: 1fr 1fr 1fr;
      /* 2 filas de 180px */
      grid-template-rows: 180px 180px;
      gap: 4px;
      width: 100%;
      max-width: 800px;
      margin-bottom: 40px;
    }

    /* La primera foto ocupa las 2 filas (más grande) */
    .foto:first-child {
      grid-row: 1 / 3;
    }

    /* Cada celda de foto */
    .foto {
      background-color: #0f0c08;
      border: 1px solid rgba(184, 150, 62, 0.15);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      /* Para poder poner un <img> dentro con object-fit */
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.3s;
    }

    .foto:hover {
      border-color: var(--dorado);
    }

    /* Kanji decorativo dentro de cada foto */
    .foto-kanji {
      font-family: 'Noto Serif JP', serif;
      font-size: 30px;
      color: rgba(184, 150, 62, 0.3);
    }

    /* Texto "Añade tu imagen" */
    .foto-texto {
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(245, 240, 232, 0.2);
      text-transform: uppercase;
    }

    /* ══════════════════════════════
       BOTONES DE NAVEGACIÓN
    ══════════════════════════════ */

    /* Fila con los dos botones principales */
    .botones-fila {
      display: flex;
      gap: 16px;
      width: 100%;
      max-width: 800px;
      margin-bottom: 16px;
    }

    /* Botón base */
    .btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 16px;
      text-decoration: none;
      border: 1px solid rgba(192, 57, 43, 0.35);
      background-color: rgba(192, 57, 43, 0.05);
      transition: background-color 0.3s, border-color 0.3s, transform 0.2s;
      cursor: pointer;
    }

    .btn:hover {
      background-color: rgba(192, 57, 43, 0.12);
      border-color: var(--rojo);
      transform: translateY(-3px);
    }

    /* Kanji grande dentro del botón */
    .btn-kanji {
      font-family: 'Noto Serif JP', serif;
      font-size: 30px;
      color: var(--rojo);
      opacity: 0.7;
      margin-bottom: 8px;
    }

    /* Nombre del botón en mayúsculas */
    .btn-nombre {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 5px;
      color: var(--papel);
      text-transform: uppercase;
    }

    /* Subtexto en japonés */
    .btn-sub {
      font-family: 'Noto Serif JP', serif;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--gris);
      margin-top: 4px;
    }

    /* ── Botón de ambientación (centrado, más ancho) ── */
    .btn-centro {
      width: 100%;
      max-width: 800px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 22px 40px;
      text-decoration: none;
      border: 1px solid rgba(184, 150, 62, 0.3);
      background-color: rgba(184, 150, 62, 0.04);
      transition: background-color 0.3s, border-color 0.3s, transform 0.2s;
      cursor: pointer;
    }

    .btn-centro:hover {
      background-color: rgba(184, 150, 62, 0.1);
      border-color: var(--dorado);
      transform: translateY(-3px);
    }

    /* Los kanjis laterales del botón central son dorados */
    .btn-centro .btn-kanji {
      color: var(--dorado);
    }

    /* ══════════════════════════════
       PIE DE PÁGINA
    ══════════════════════════════ */

    footer {
      margin-top: 48px;
      font-family: 'Noto Serif JP', serif;
      font-size: 11px;
      letter-spacing: 6px;
      color: rgba(107, 101, 96, 0.5);
    }

  </style>
</head>
<body>

  <!-- ── CABECERA ── -->
  <header>
    <p class="subtitulo-jp">フォルツァ・ホライゾン</p>
    <h1>FORZA HORIZON 6</h1>
    <div class="divisor">
      <div class="divisor-linea"></div>
      <div class="divisor-rombo"></div>
      <div class="divisor-linea"></div>
    </div>
    <p class="tagline">Bienvenido al mundo del motor · 速さと感動が交わる世界へ</p>
  </header>

  <!-- ── GRID DE FOTOS ── -->
  <!-- Para añadir una imagen real: pon un <img src="tu-foto.jpg"> dentro de .foto -->
  <div class="fotos">
    <div class="foto"><span class="foto-kanji">疾</span><span class="foto-texto">Imagen</span></div>
    <div class="foto"><span class="foto-kanji">車</span><span class="foto-texto">Imagen</span></div>
    <div class="foto"><span class="foto-kanji">道</span><span class="foto-texto">Imagen</span></div>
    <div class="foto"><span class="foto-kanji">速</span><span class="foto-texto">Imagen</span></div>
    <div class="foto"><span class="foto-kanji">風</span><span class="foto-texto">Imagen</span></div>
  </div>

  <!-- ── BOTONES MOTOS Y COCHES ── -->
  <div class="botones-fila">

    <a class="btn" href="motos.html">
      <span class="btn-kanji">単</span>
      <span class="btn-nombre">Motos</span>
      <span class="btn-sub">二輪の道</span>
    </a>

    <a class="btn" href="coches.html">
      <span class="btn-kanji">輪</span>
      <span class="btn-nombre">Coches</span>
      <span class="btn-sub">四輪の力</span>
    </a>

  </div>

  <!-- ── BOTÓN AMBIENTACIÓN (centrado) ── -->
  <a class="btn-centro" href="ambientacion.html">
    <span class="btn-kanji">間</span>
    <div>
      <div class="btn-nombre">Ambientación</div>
      <div class="btn-sub">空間と雰囲気 · Espacio y atmósfera</div>
    </div>
    <span class="btn-kanji">境</span>
  </a>

  <!-- ── PIE ── -->
  <footer>FORZA HORIZON VI · フォルツァ · 2025</footer>

</body>
</html>
